# change the followings to match your Github username and repo name
baseurl: "/LondonHouseProject" # the name of your github repo
url: "https://SchuylerG22.github.io" # the url of your github pages (change BCDigSchol to your username)

# site information used in page title, meta data etc.
title: "London House Project"
description: Your Project Description @ Boston College

# color theme for links
theme-color: indigo # indigo|blue|pink|green|stone|

# nav bar settings and links
nav-menu:
  - title: Home
    link: index
  - title: About
    link: about
    submenu:
      - title: Source
        link: source
      - title: Method
        link: method
      - title: Bibliography
        link: bibliography
   - title: Findings
     link: findings
     submenue:
       - title: Meat
         link: meat
       - title: Fish
         link: fish
       - title: Dairy and Poultry
         link: dairy-and-poultry
       - title: Results
        link: results
   - title: Further Research
     link: further-research
     submenue:
       - title: Available Materials
         link: available-materials
       - title: Further Readings 
         link: further-readings
       - title: Next Steps 
         link: next-steps
        
# sets whether a search bar appears on the site header
search-bar: false

hide-footer: false # set to true to hide the footer
footer-message: The London House Project | CC BY-NC License
footer-submessage:  By Schuyler Gardner, with the Digital Scholarship Group, Boston College
footer-submessage-link: https://ds.bc.edu

# google-analytics: // if you want to use Google analytics, include your ID here

# sets number of items display per page, if using a blog
paginate: 5

include:
  - _pages

# jekyll plugins - no need to change
plugins:
    - jekyll-seo-tag
    - jekyll-feed
    - jekyll-paginate
    - jekyll-postcss-v2

